const quizData = [];
for(let i=0;i<200;i++){
  const b = baseQuotes[i % baseQuotes.length];
  quizData.push({...b, id:i+1});
}
const TOTAL_QUESTIONS = 20;
let questions=[], index=0, correct=0, answered=false, timer=null;
const genreEl=document.getElementById('genre'), counterEl=document.getElementById('counter'), progressEl=document.getElementById('progress'), quoteEl=document.getElementById('quote'), personEl=document.getElementById('person'), choicesEl=document.getElementById('choices'), resultEl=document.getElementById('result'), scoreEl=document.getElementById('score'), cardEl=document.getElementById('card');
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}
function start(){questions=shuffle(quizData).slice(0,TOTAL_QUESTIONS);index=0;correct=0;answered=false;clearTimeout(timer);showQuestion()}
function showQuestion(){answered=false;clearTimeout(timer);if(index>=questions.length){showFinal();return}const q=questions[index];genreEl.textContent=q.g;counterEl.textContent=`${index+1} / ${questions.length}`;progressEl.style.width=`${(index/questions.length)*100}%`;quoteEl.textContent=`「${q.q}」`;personEl.textContent=`― ${q.p}`;scoreEl.textContent=`正解：${correct}問`;resultEl.style.display='none';resultEl.innerHTML='';choicesEl.innerHTML='';[{label:'実際に言った',value:true,cls:'real'},{label:'偽物',value:false,cls:'fake'}].forEach(c=>{const btn=document.createElement('button');btn.className=c.cls;btn.textContent=c.label;btn.onclick=()=>answer(c.value,btn);choicesEl.appendChild(btn)});}
function answer(value,btn){if(answered)return;answered=true;const q=questions[index];const ok=value===q.a;if(ok)correct++;[...choicesEl.querySelectorAll('button')].forEach(b=>{b.disabled=true;const isReal=b.textContent.includes('実際');const bVal=isReal;if(bVal===q.a)b.classList.add('correct');else if(b===btn)b.classList.add('wrong')});resultEl.style.display='block';resultEl.innerHTML=`<div class="judge">${ok?'正解！':'不正解…'} 正しくは「${q.a?'実際に言った':'偽物'}」</div><div>${q.e}</div><div class="source">${q.a?'※有名な出典・逸話として知られる名言です。':'※この問題用に作った偽名言です。'}</div>`;scoreEl.textContent=`正解：${correct}問`;progressEl.style.width=`${((index+1)/questions.length)*100}%`;timer=setTimeout(()=>{index++;showQuestion()},1200)}
function skip(){if(answered)return;answered=true;resultEl.style.display='block';resultEl.innerHTML='<div class="judge">スキップしました</div><div>次の問題へ進みます。</div>';[...choicesEl.querySelectorAll('button')].forEach(b=>b.disabled=true);timer=setTimeout(()=>{index++;showQuestion()},700)}
function showFinal(){const rate=Math.round((correct/questions.length)*100);let rank='名言ハンター';if(rate>=90)rank='偉人級の名言博士';else if(rate>=70)rank='かなり鋭い判定士';else if(rate>=50)rank='平均以上の見抜き力';else rank='偽物にだまされがち';cardEl.innerHTML=`<div class="final"><h2>結果発表</h2><div class="finalscore">${correct} / ${questions.length}</div><div class="rank">${rank}</div><p>正答率：${rate}%</p><button class="btn" onclick="location.reload()">もう一度遊ぶ</button><p class="small">総数200問から毎回ランダムで20問出題されます。</p></div>`}
document.getElementById('skip').onclick=skip;document.getElementById('restart').onclick=start;start();
</script>
